<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spitfire Shop</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">
    <style>
    body {
        margin: 0;
        padding: 0;
        color: rgb(0, 0, 0);
        border-top: solid 10px #7c7c00;
        background-image: url('../assets/images/background/background.jpg');
        background-size: cover;
        background-color: white;
    }
    </style>
</head>

<body>
    <img src="assets/images/background/spitfire-bannermain.jpg" alt="spitfire-banner" style="width: 100%; position: relative;">

    <header class="main-header">
        <div class="main-title">
            <img src="assets/images/logo/logo.png" alt="Spitfire logo" style="width: 4vw;">
            <div id="head-title">
            <h1>Open Skies</h1>
            <p>Encyclopedia | Merch | Forum</p>
            </div>
        </div>
        <div id="menu-items">
            <a class="item" href="/">Home</a>
            <a class="item">Gallery</a>
            <a class="item" href="https://shop.iwm.org.uk/collections/spitfire-clothing?srsltid=AfmBOoo-qoiJBwa1YP_qm4jPLXe5HnED7MspYuSpKVtRNtLR2jFDrpOj" target="_blank">Merch</a>
            <a class="item" href="/forum"text-decoration: underline;">Forum</a>
            <div class="item">Account</div>
            <a class="item">Other</a>
        </div>
    </header>

<div class="margin">
<section class="forum-mid-section" id="point">
    <div style="margin: 10px; background-color: antiquewhite; padding: 1vw;">
        <h2>Browse by topic</h2>
        <h3>World history</h3>
        <div class="margin-item" style="padding: 0.5vw;">General History</div>
        <div class="margin-item" style="padding: 0.5vw;">European History</div>
        <div class="margin-item" style="padding: 0.5vw;">Asian History</div>
        <div class="margin-item" style="padding: 0.5vw;">North American History</div>
        <div class="margin-item" style="padding: 0.5vw;">South American History</div>
    </div>
    <div id="create-section">
        <div class="content-row">
        <h2>Create a post</h2>
        <a href="/forum" alt="Back to forum">Go back</a>
        </div>
        <form id="create-form">
            <div class="content-row">
            <input type="text" name="title" placeholder="Title">
            <select name="category">
                <option value="General History">General History</option>
                <option value="European History">European History</option>
                <option value="Asian History">Asian History</option>
                <option value="North American History">North American History</option>
                <option value="South American History">South American History</option>
            </select>
            </div>
            <div class="content-column">
                <textarea name="sections[]" class="textBox" style="resize: none;" rows="7"></textarea>
                <input type="file" name="images[]">
            <button style="margin: 10px; width: 15%;">+ Add section</button>
                <input type="submit" style="width: 5vw; font-size: 0.5vw;" value="Create post">
            </div>
        </form>
    </div>
</section>
</div>
<script src="/assets/script/create-post.js"></script>
</body>
</html>
